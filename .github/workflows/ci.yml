name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  aqarify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aqarify

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: aqarify/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run type-check

      - name: Build client
        run: npm run build --prefix client

      - name: Build server
        run: npm run build --prefix server
