<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#141414" />
    <title>عقاري | منصة العقارات الذكية</title>
    <meta name="description" content="عقاري - منصة إدارة العقارات الذكية للمطورين والمشترين في مصر" />
    <!-- Maison Neue via Adobe Fonts / fallback stack -->
    <style>
      @font-face {
        font-family: 'Maison Neue';
        font-style: normal;
        font-weight: 300;
        font-display: swap;
        src: local('Maison Neue Light'), local('MaisonNeue-Light');
      }
      @font-face {
        font-family: 'Maison Neue';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: local('Maison Neue'), local('MaisonNeue-Regular');
      }
      @font-face {
        font-family: 'Maison Neue';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: local('Maison Neue Medium'), local('MaisonNeue-Medium');
      }
      @font-face {
        font-family: 'Maison Neue';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: local('Maison Neue Bold'), local('MaisonNeue-Bold');
      }
    </style>
    <!-- Google Fonts: DM Sans (Maison Neue fallback) + Cairo (Arabic RTL) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Cairo:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
